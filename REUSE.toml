version = 1
SPDX-PackageName = "dotfiles"
SPDX-PackageSupplier = "Keith Maxwell <keith.maxwell@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/maxwell-k/dotfiles"

# file formats that do no suit comments
[[annotations]]
path = [
  ".dprint.json",
  ".en.utf-8.add",
  ".gitignore",
  ".renovaterc.json",
  "config/git/attributes",
  "config/git/ignore",
]
SPDX-FileCopyrightText = "2026 Keith Maxwell <keith.maxwell@gmail.com>"
SPDX-License-Identifier = "CC0-1.0"

[[annotations]]
path = [
  # also included in ~/.vim/site.yaml
  "local/bin/jsonlint",
  "local/bin/prettier",
  "local/bin/pyright-langserver",
  # includied in README.md so hide comments here
  ".README.md-files/1.sh",
  ".README.md-files/2.sh",
  ".README.md-files/3.sh",
]
SPDX-FileCopyrightText = "2025 Keith Maxwell <keith.maxwell@gmail.com>"
SPDX-License-Identifier = "MPL-2.0"

